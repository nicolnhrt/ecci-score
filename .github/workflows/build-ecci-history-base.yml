name: Build ECCI History Base

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-history-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build long historical base
        env:
          ECCI_PROXY_URL: ${{ secrets.ECCI_PROXY_URL }}
          ECCI_PROXY_TOKEN: ${{ secrets.ECCI_PROXY_TOKEN }}
        run: node scripts/update-ecci-snapshot.mjs --history-base

      - name: Commit history base
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild ECCI history base"
          file_pattern: data/ecci-history-base.json
